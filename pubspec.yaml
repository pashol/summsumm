name: summsumm
description: AI Text Summarizer — share-menu and text-selection AI summarizer.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  http: ^1.3.0
  http_parser: ^4.0.0
  flutter_secure_storage: ^9.2.0
  flutter_markdown: ^0.7.0
  flutter_tts: ^4.2.0
  shared_preferences: ^2.5.0
  riverpod_annotation: ^2.6.1
  google_fonts: ^6.2.1
  path_provider: ^2.1.0
  path: ^1.9.0
  syncfusion_flutter_pdf: ^33.1.49
  flutter_sound: ^9.30.0
  permission_handler: ^11.4.0
  speech_to_text: ^7.3.0
  uuid: ^4.5.0
  connectivity_plus: ^6.0.0
  flutter_slidable: ^3.1.1
  share_plus: ^10.1.4
  file_picker: ^8.1.6
  freezed_annotation: ^3.1.0
  json_serializable: ^6.9.5
  build_runner: ^2.5.4
  intl: ^0.19.0
  ffmpeg_kit_flutter_new_min: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.0

flutter:
  uses-material-design: true